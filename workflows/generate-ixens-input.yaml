ixens:
  - slug: xen-hypervisor
    title: Being a Xen hypervisor
    description: The host narrates Xen's domain model, CPU, memory, I/O, device isolation, migration, and failure boundaries.
    topic: Life as a Xen hypervisor
    narrator: a Xen hypervisor
    heroPrompt: >-
      A Xen hypervisor as a stern geometric machine-intelligence suspended above
      dom0, driver domains, and several domU guests, technical diagram energy,
      CPU rings, memory maps, IOMMU tables, event channels, scheduler queues,
      white paper texture, precise linework.
    concepts:
      - name: Domain model and privilege boundaries
        imageFilename: concept-1.png
        imagePrompt: >-
          Xen domain architecture rendered as a precise white-paper systems
          diagram, hypervisor layer below dom0, driver domains, stub domains,
          and domU guests, privilege boundaries and control paths visible,
          ixen-light technical illustration.
        details: >-
          Cover the Xen split between the small hypervisor, dom0, domU, driver
          domains, stub domains, and the toolstack. Explain where authority
          lives, what guests cannot do directly, and why dom0 is both a
          management plane and a risk concentration.
      - name: Boot modes and guest execution
        imageFilename: concept-2.png
        imagePrompt: >-
          Xen PV, HVM, and PVH guest execution modes shown as stacked CPU
          privilege transitions, hypercalls, emulated devices, paravirtual
          drivers, and hardware virtualization assists, crisp ixen-light systems
          artwork.
        details: >-
          Explain PV, HVM, and PVH at a systems level: hypercalls, trap handling,
          emulation, paravirtual drivers, firmware expectations, and the tradeoff
          between hardware compatibility, performance, and attack surface.
      - name: CPU scheduling and vCPU topology
        imageFilename: concept-3.png
        imagePrompt: >-
          Xen CPU scheduling visualized as pCPUs, vCPUs, run queues, NUMA nodes,
          affinity masks, credit accounting, steal time, and latency-sensitive
          guests, precise ixen-light technical diagram.
        details: >-
          Cover credit and credit2 style scheduling, pCPU/vCPU mapping, pinning,
          NUMA locality, steal time, overcommit, latency-sensitive workloads,
          and how capacity planning differs from guest-visible entitlement.
      - name: Memory ownership and translation
        imageFilename: concept-4.png
        imagePrompt: >-
          Xen memory management drawn as machine frames, guest physical frames,
          page tables, shadow or nested translation, balloon drivers, and
          controlled page sharing paths, ixen-light technical illustration.
        details: >-
          Cover machine frames versus guest physical memory, page table
          mediation, shadow or hardware-assisted translation, ballooning,
          overcommit pressure, scrubbing, and how grants fit as one controlled
          sharing mechanism rather than the whole story.
      - name: I/O paths and split drivers
        imageFilename: concept-5.png
        imagePrompt: >-
          Xen split-driver I/O path shown from frontend drivers through shared
          rings, event channels, backend drivers in dom0 or a driver domain, and
          physical NIC and block devices, crisp ixen-light systems art.
        details: >-
          Explain frontend/backend drivers, shared rings, event channels, grant
          references, blkfront/blkback, netfront/netback, xenstore coordination,
          and why many operational failures appear as stalled backends or
          mismatched device state.
      - name: Device assignment and DMA isolation
        imageFilename: concept-6.png
        imagePrompt: >-
          Xen PCI passthrough and DMA isolation rendered with IOMMU tables,
          interrupt remapping, SR-IOV virtual functions, assigned devices, and
          trust boundaries around guests, precise ixen-light diagram.
        details: >-
          Cover PCI passthrough, IOMMU and interrupt remapping, SR-IOV, device
          reset behavior, firmware quirks, DMA containment, and the point where
          performance isolation becomes a hardware trust problem.
      - name: Live migration and state transfer
        imageFilename: concept-7.png
        imagePrompt: >-
          Xen live migration as a staged state-transfer diagram, guest memory
          pages copied and dirtied, vCPU state paused briefly, storage and
          network identity preserved across hosts, ixen-light technical artwork.
        details: >-
          Explain save/restore and live migration, pre-copy memory transfer,
          dirty page rates, vCPU/device state, shared or replicated storage,
          network continuity, clock behavior, and why migration exposes hidden
          coupling between guest, host, and fabric.
      - name: Operations, observability, and failure modes
        imageFilename: concept-8.png
        imagePrompt: >-
          Xen operational diagnostics shown as xl and xenstore views, dom0 logs,
          hypervisor traces, stalled rings, IRQ storms, noisy guests, and
          security boundaries under stress, crisp ixen-light systems diagram.
        details: >-
          Cover xl/libxl, xenstore, dom0 logs, hypervisor tracing, driver-domain
          health, noisy-neighbor behavior, IRQ and softirq pressure, backend
          stalls, dom0 compromise risk, and the practical shape of Xen incident
          response.
    details: >-
      Treat the reader as a peer. Give a full Xen overview: hypervisor versus
      dom0, domU, driver and stub domains, PV/HVM/PVH execution, CPU scheduling,
      memory translation and ballooning, I/O split drivers, grant references and
      event channels, xenstore, PCI passthrough, IOMMU isolation, live migration,
      observability, security boundaries, and operational failure modes. Do not
      over-center grants or ballooning; present them as parts of the larger
      architecture.
  - slug: puppet-catalog
    title: Everything is in a Puppet catalog
    description: The catalog speaks about resources, edges, facts, and the quiet violence of convergence.
    topic: Life as a Puppet catalog
    narrator: a Puppet catalog
    heroPrompt: >-
      A Puppet catalog as a luminous compiled resource graph — nodes and edges
      drawn in red thread over a dark substrate, classes and defined types
      crystallizing into ordered resources, facts feeding compilation like
      live signals, cerebral and architectural, restrained technical palette.
    concepts:
      - name: Resources and the type system
        imageFilename: concept-1.png
        imagePrompt: >-
          Puppet resource types shown as a precise taxonomy — file, package,
          service, exec, user, group, and custom types — each with attributes,
          namevar, title, and provider layers, ixen-light technical illustration.
        details: >-
          Explain what a Puppet resource is: a typed declaration of desired
          state. Cover resource types (built-in and custom), the namevar
          convention, title versus name, attributes and their defaults, the
          ensure attribute, and the provider layer that maps declared state to
          real system operations. Contrast resource declarations with
          imperative scripts: the catalog contains intent, not procedure.
      - name: Manifests, classes, and modules
        imageFilename: concept-2.png
        imagePrompt: >-
          Puppet module structure rendered as a precise filesystem diagram —
          manifests, templates, files, lib, data directories — with class
          declarations, defined types, and autoloader paths visible, crisp
          ixen-light systems art.
        details: >-
          Cover manifests as Puppet code files, class declarations and
          definitions, the difference between a class and a defined type,
          include versus class{} versus require, module layout (manifests/,
          templates/, files/, lib/, data/), the autoloader and naming
          conventions, and how the Puppet module ecosystem and Forge fit into
          an organisation's code base.
      - name: Catalog compilation
        imageFilename: concept-3.png
        imagePrompt: >-
          Puppet catalog compilation shown as sequential phases — node
          classification, fact injection, manifest evaluation, class inclusion,
          defined type instantiation, and final resource graph output — precise
          ixen-light technical diagram.
        details: >-
          Explain the full compilation pipeline: node classification (ENC or
          site.pp), fact injection, manifest parsing, top-scope and node-scope
          variable resolution, class and defined-type evaluation, collector
          expressions, conditional logic, and the output — a serialised
          resource graph sent to the agent. Cover why the catalog is
          agent-specific and why two nodes with the same classification may
          produce different catalogs from the same code.
      - name: Facts and Facter
        imageFilename: concept-4.png
        imagePrompt: >-
          Facter facts flowing into Puppet catalog compilation visualized as
          structured data streams — core facts, custom facts, external facts,
          trusted facts, and fact-conditional branching in manifests, ixen-light
          technical illustration.
        details: >-
          Explain Facter: what it is, when it runs, and how facts reach the
          compiler. Cover core facts (os, networking, memory, disks), custom
          Ruby facts, external facts (executable and JSON/YAML), trusted facts
          from the agent certificate, structured facts, and fact-based
          conditionals in manifests. Discuss fact caching, the security
          boundary between trusted and non-trusted facts, and why facts must
          be treated as untrusted input at scale.
      - name: Ordering, relationships, and dependency edges
        imageFilename: concept-5.png
        imagePrompt: >-
          Puppet resource ordering graph with before, after, require, notify,
          subscribe metaparameters as directed edges, containment arrows from
          classes and defined types, refresh signals, and cycle detection,
          precise ixen-light systems diagram.
        details: >-
          Cover the five relationship metaparameters: before, after, require,
          notify, subscribe. Explain containment — how classes and defined
          types create implicit ordering over their contents — and the
          contain() function. Cover chaining arrows, virtual resource
          realisation, the difference between ordering and refresh
          dependencies, and how the agent detects dependency cycles. Explain
          why circular dependencies and missing dependencies are the two most
          common catalog application failures.
      - name: Hiera and data lookup
        imageFilename: concept-6.png
        imagePrompt: >-
          Puppet Hiera hierarchy shown as layered lookup tiers — global,
          environment, module — with YAML backends, interpolation tokens,
          merge strategies (first, unique, hash, deep), and eyaml encrypted
          keys visible, crisp ixen-light technical art.
        details: >-
          Explain Hiera as Puppet's hierarchical data separation layer: why
          data should live outside manifests, hiera.yaml hierarchy definition,
          lookup() and automatic class parameter lookup, merge behaviour
          (first, unique, hash, deep), the three-layer hierarchy (global,
          environment, module), interpolation functions, eyaml for secrets,
          and how Hiera enables role/profile patterns by separating policy
          code from site data.
      - name: Exported resources and PuppetDB
        imageFilename: concept-7.png
        imagePrompt: >-
          Puppet exported resources and PuppetDB shown as cross-node
          coordination — nodes exporting resources into a shared store,
          collectors querying and realising them, and the catalog graph
          incorporating external state, ixen-light systems diagram.
        details: >-
          Explain exported resources as the mechanism for cross-node
          coordination: the @@ sigil, PuppetDB as the exported resource store,
          collection with <| |> and <<| |>, the storeconfigs model, and
          typical patterns (SSH host keys, Nagios checks, load balancer
          members, HAProxy fragments). Cover the performance and staleness
          implications of large collections, deactivated node cleanup, and
          the catalog's dependency on PuppetDB availability for exported
          resource workflows.
      - name: The agent run cycle and idempotence
        imageFilename: concept-8.png
        imagePrompt: >-
          Puppet agent run cycle visualized as a timed loop — fact collection,
          catalog request, catalog application, provider actions, report
          submission — with idempotent convergence arrows and drift detection
          markers, precise ixen-light technical illustration.
        details: >-
          Explain the full agent run: fact collection, catalog request and
          compilation on the Puppetserver, catalog download, resource
          evaluation in dependency order, provider-level enforcement (ensure,
          sync, noop), change and event reporting, and run intervals. Define
          idempotence: running the same catalog repeatedly produces the same
          end state. Cover drift — system state diverging from catalog intent —
          how Puppet detects and corrects it, and the practical limits:
          resources Puppet cannot model, exec resources that defeat idempotence,
          and the role of noop mode in safe change validation.
    details: >-
      Treat the reader as a peer with sysadmin depth but possibly new to
      Puppet's model. Give a complete picture of what a Puppet catalog is and
      how it comes to exist: the resource type system, the provider abstraction,
      manifest and module structure, the full compilation pipeline (node
      classification, fact injection, code evaluation, graph output), Facter and
      the fact trust boundary, relationship metaparameters and containment,
      dependency ordering and refresh signals, Hiera and data separation, the
      role/profile/module pattern, exported resources and PuppetDB, the agent
      run loop, idempotent convergence, drift, noop mode, and reporting.
      Narrate as the catalog itself — a compiled, agent-specific resource graph
      that embodies declared intent. Emphasise the declarative model and its
      consequences: ordering is explicit, convergence is automatic, and the
      catalog is not a script but a specification of desired state.
  - slug: git-repository
    title: Life as a Git repository
    description: A repository narrates objects, refs, the index, merges, rebases, remotes, maintenance, and recovery.
    topic: Life as a Git repository
    narrator: a Git repository
    heroPrompt: >-
      A Git repository as an archaeological vault of objects, refs, index
      entries, remote-tracking branches, packfiles, reflogs, worktrees, and
      commit DAGs, technical surrealism with crisp documentary detail and
      forensic systems-map precision.
    concepts:
      - name: Object model and content identity
        imageFilename: concept-1.png
        imagePrompt: >-
          Git blobs, trees, commits, tags, object IDs, loose objects, packfiles,
          and delta chains displayed as a forensic storage cross-section,
          meticulous ixen-light technical illustration.
        details: >-
          Cover Git's content-addressed object database: blobs, trees, commits,
          annotated tags, object IDs, loose objects, packfiles, delta
          compression, reachability, alternates, and why the repository stores
          snapshots as linked immutable objects rather than mutable file
          versions.
      - name: Working tree, index, and commit construction
        imageFilename: concept-2.png
        imagePrompt: >-
          Git working tree, index, and commit creation rendered as three
          synchronized filesystem layers with staged hunks, pathspec filters,
          stat cache entries, and tree writes, crisp ixen-light systems art.
        details: >-
          Explain the three-tree mental model: working tree, index, and HEAD.
          Cover status, add, restore, reset, commit, diff, rm, mv, clean, stash,
          patch mode, intent-to-add, pathspecs, attributes, ignores, and how the
          index is both a staging area and a merge-resolution data structure.
      - name: Refs, HEAD, reflogs, and revision language
        imageFilename: concept-3.png
        imagePrompt: >-
          Git refs visualized as movable labels over a commit DAG, with HEAD,
          symbolic refs, packed refs, namespaces, tags, reflogs, revision ranges,
          and ancestry selectors, precise ixen-light technical diagram.
        details: >-
          Cover branches, tags, remote-tracking refs, symbolic HEAD, detached
          HEAD, packed refs, reflogs, namespaces, rev-parse style revision
          syntax, ranges, merge bases, ancestry selectors, and the practical
          difference between moving a name and changing the objects it names.
      - name: Branching, merging, and conflict logic
        imageFilename: concept-4.png
        imagePrompt: >-
          Git branch and merge logic shown as a commit DAG with merge bases,
          recursive and ort merge machinery, fast-forward updates, conflict
          stages in the index, rerere memory, and signed merge commits,
          ixen-light systems illustration.
        details: >-
          Explain branch creation and movement, switch and checkout, merge-base,
          fast-forward versus true merge commits, conflict stages, ours/theirs
          semantics, rerere, merge strategies and strategy options, revert
          versus reset, and why a merge records topology while preserving both
          sides' ancestry.
      - name: Rebases, cherry-picks, and history rewriting
        imageFilename: concept-5.png
        imagePrompt: >-
          Git rebase and cherry-pick rendered as commits being replayed onto a
          new base, old objects becoming unreachable but visible in reflogs,
          interactive todo lists, autosquash, fixup commits, and force-with-lease
          guards, crisp ixen-light technical artwork.
        details: >-
          Cover rebase, interactive rebase, autosquash, cherry-pick, revert,
          amend, reset modes, filter-repo style rewriting, signed commits, notes,
          replace refs, force-with-lease, publication boundaries, and the logic
          of replaying patches into new commits instead of editing old objects.
      - name: Remotes, transport, and synchronization
        imageFilename: concept-6.png
        imagePrompt: >-
          Git remotes shown as repositories exchanging object graphs through
          fetch, push, pull, refspecs, remote-tracking branches, shallow and
          partial clones, promisor objects, and negotiation bitmaps, precise
          ixen-light diagram.
        details: >-
          Explain clone, remote, fetch, pull, push, refspecs, upstream tracking,
          remote-tracking branches, tags, pruning, shallow clones, partial
          clones, bundles, protocol negotiation, pack bitmaps, and the difference
          between copying objects, updating refs, and integrating fetched
          history.
      - name: Collaboration workflows and release motion
        imageFilename: concept-7.png
        imagePrompt: >-
          Git collaboration workflows drawn as parallel lanes for trunk-based
          development, feature branches, protected branches, stacked changes,
          release branches, tags, pull requests, CI gates, and bisectable
          history, ixen-light workflow map.
        details: >-
          Cover trunk-based development, feature branches, topic branches,
          stacked changes, pull requests and merge requests, squash merges,
          merge queues, release branches, tags, backports, hotfixes, bisectable
          commits, blame-aware review, signed-off-by trails, hooks, config, and
          when linear history helps or harms operations.
      - name: Maintenance, recovery, and advanced repository shapes
        imageFilename: concept-8.png
        imagePrompt: >-
          Git repository maintenance and recovery shown with gc, maintenance,
          fsck, prune, repack, commit-graph files, multi-pack indexes, worktrees,
          submodules, sparse checkouts, dangling objects, and reflog rescue
          paths, forensic ixen-light systems art.
        details: >-
          Cover gc, maintenance, repack, prune, fsck, commit-graph, multi-pack
          indexes, cruft packs, object expiry, reflog expiry, worktree, submodule,
          sparse-checkout, archive, bundle, cat-file, hash-object, update-index,
          write-tree, commit-tree, update-ref, for-each-ref, and incident
          response recovery from reflogs, dangling commits, backups, and remote
          copies.
    details: >-
      Treat the reader as a peer. Give a complete Git overview: the immutable
      object model, blobs, trees, commits, tags, object IDs, loose objects,
      packfiles, delta compression, commit DAGs, reachability, the working tree,
      the index, HEAD, refs, packed refs, symbolic refs, reflogs, revision
      selection, pathspecs, attributes, ignores, branch movement, merge-base,
      merge strategies, conflict stages, rerere, rebase, interactive rebase,
      cherry-pick, revert, amend, reset, restore, switch, checkout, stash, clean,
      tags, notes, signed commits, remotes, refspecs, clone, fetch, pull, push,
      upstream tracking, remote-tracking branches, shallow clones, partial
      clones, sparse checkout, worktrees, submodules, hooks, config, aliases,
      bisect, blame, log, show, diff, grep, archive, bundle, gc, maintenance,
      repack, prune, fsck, commit-graph, multi-pack indexes, cruft packs, and
      incident-response style recovery. Explain both porcelain commands and the
      plumbing beneath them, especially cat-file, hash-object, update-index,
      write-tree, commit-tree, update-ref, rev-parse, and for-each-ref. Emphasize
      repository logic and usage: Git copies objects separately from moving
      refs, integration is separate from transport, rewriting creates new
      objects, garbage collection is delayed forgetting, and collaboration
      workflows are policies layered on top of the same object graph.
