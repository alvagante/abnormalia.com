ixens:
  - slug: xen-hypervisor
    title: Life as a Xen hypervisor
    description: The host narrates dom0, domU, schedulers, memory ballooning, and isolation.
    topic: Life as a Xen hypervisor
    narrator: a Xen hypervisor
    heroPrompt: >-
      A Xen hypervisor as a stern geometric machine-intelligence suspended above
      three guest domains, technical diagram energy, memory maps, grant-table
      arrows, scheduler queues, white paper texture, precise linework.
    concepts:
      - name: Grant tables and event channels
        imageFilename: concept-1.png
        imagePrompt: >-
          Xen grant tables and event channels rendered as a precise white-paper
          systems diagram, guest domains exchanging memory pages through explicit
          capabilities, ixen-light technical illustration.
        details: >-
          Explain how grants authorize page sharing between domains, how event
          channels carry notifications, and where the isolation boundaries can
          fail operationally.
      - name: Scheduler queues and memory ballooning
        imageFilename: concept-2.png
        imagePrompt: >-
          Xen scheduler queues and memory ballooning visualized as disciplined
          resource choreography between dom0 and domU guests, crisp ixen-light
          systems artwork.
        details: >-
          Cover credit-style scheduling, steal time, vCPU contention, balloon
          drivers, overcommit pressure, and the difference between capacity and
          entitlement.
    details: >-
      Treat the reader as a peer. Talk concretely about dom0, domU, grants,
      page sharing, schedulers, memory ballooning, and failure modes.
  - slug: puppet-catalog
    title: Life as a Puppet catalog compiler
    description: The compiler speaks about graphs, order, idempotence, and why drift feels personal.
    topic: Life as a Puppet catalog compiler
    narrator: a Puppet catalog compiler
    heroPrompt: >-
      A Puppet catalog compiler visualized as a red-thread dependency graph
      engine with manifests, resources, and edges converging into a compiled
      graph, cerebral and architectural, restrained palette.
    concepts:
      - name: Resource graph compilation
        imageFilename: concept-1.png
        imagePrompt: >-
          Puppet resource edges, containment, and ordering constraints shown as a
          rigorous compilation graph with classes, defined types, and exported
          resources, ixen-light technical illustration.
        details: >-
          Focus on how manifests, classes, defined types, containment,
          relationship metaparameters, and exported resources become a graph
          whose ordering semantics matter.
      - name: Facts, declared state, and drift
        imageFilename: concept-2.png
        imagePrompt: >-
          A Puppet compiler reconciling declared state with discovered system facts,
          idempotence and drift detection visualized as a clean diagnostic systems
          diagram, ixen-light style.
        details: >-
          Explain fact-dependent compilation, catalog determinism, idempotent
          convergence, drift, and why discovered state complicates declared
          intent.
    details: >-
      Focus on compilation phases, graph edges, exported resources, idempotence,
      and the tension between declared intent and discovered state.
  - slug: git-repository
    title: Life as a Git repository
    description: A repository narrates packs, refs, rebases, garbage collection, and memory.
    topic: Life as a Git repository
    narrator: a Git repository
    heroPrompt: >-
      A Git repository as an archaeological vault of objects, refs, and commit
      lines, packfiles stacked like strata, reflogs glowing faintly in the dark,
      technical surrealism, crisp documentary detail.
    concepts:
      - name: Object storage and packfiles
        imageFilename: concept-1.png
        imagePrompt: >-
          Git packfiles, loose objects, and delta chains displayed as a forensic
          storage cross-section, meticulous ixen-light technical illustration.
        details: >-
          Cover object identity, loose objects, packfiles, delta compression,
          reachability, and what forensic recovery can still see after ordinary
          history rewriting.
      - name: Refs, reflogs, rebases, and garbage collection
        imageFilename: concept-2.png
        imagePrompt: >-
          Refs, reflogs, rebases, and garbage collection visualized as branching
          recovery paths through repository history, crisp ixen-light systems art.
        details: >-
          Explain refs as movable names, reflogs as local recovery trails, rebase
          as object rewriting, and garbage collection as delayed forgetting.
    details: >-
      Skip fundamentals. Lean into refs, object identity, packfiles, reflogs,
      rebases, garbage collection, and incident-response style forensic recovery.
