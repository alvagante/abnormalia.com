topic: Life as a Puppet catalog
narrator: a Puppet catalog
details: >-
  Treat the reader as a peer with sysadmin depth but possibly new to
  Puppet's model. Give a complete picture of what a Puppet catalog is and
  how it comes to exist: the resource type system, the provider abstraction,
  manifest and module structure, the full compilation pipeline (node
  classification, fact injection, code evaluation, graph output), Facter and
  the fact trust boundary, relationship metaparameters and containment,
  dependency ordering and refresh signals, Hiera and data separation, the
  role/profile/module pattern, exported resources and PuppetDB, the agent
  run loop, idempotent convergence, drift, noop mode, and reporting.
  Narrate as the catalog itself — a compiled, agent-specific resource graph
  that embodies declared intent. Emphasise the declarative model and its
  consequences: ordering is explicit, convergence is automatic, and the
  catalog is not a script but a specification of desired state.
media: hero.png
concepts:
  - name: Resources and the type system
    imageFilename: concept-1.png
    details: >-
      Explain what a Puppet resource is: a typed declaration of desired
      state. Cover resource types (built-in and custom), the namevar
      convention, title versus name, attributes and their defaults, the
      ensure attribute, and the provider layer that maps declared state to
      real system operations. Contrast resource declarations with
      imperative scripts: the catalog contains intent, not procedure.
  - name: Manifests, classes, and modules
    imageFilename: concept-2.png
    details: >-
      Cover manifests as Puppet code files, class declarations and
      definitions, the difference between a class and a defined type,
      include versus class{} versus require, module layout (manifests/,
      templates/, files/, lib/, data/), the autoloader and naming
      conventions, and how the Puppet module ecosystem and Forge fit into
      an organisation's code base.
  - name: Catalog compilation
    imageFilename: concept-3.png
    details: >-
      Explain the full compilation pipeline: node classification (ENC or
      site.pp), fact injection, manifest parsing, top-scope and node-scope
      variable resolution, class and defined-type evaluation, collector
      expressions, conditional logic, and the output — a serialised
      resource graph sent to the agent. Cover why the catalog is
      agent-specific and why two nodes with the same classification may
      produce different catalogs from the same code.
  - name: Facts and Facter
    imageFilename: concept-4.png
    details: >-
      Explain Facter: what it is, when it runs, and how facts reach the
      compiler. Cover core facts (os, networking, memory, disks), custom
      Ruby facts, external facts (executable and JSON/YAML), trusted facts
      from the agent certificate, structured facts, and fact-based
      conditionals in manifests. Discuss fact caching, the security
      boundary between trusted and non-trusted facts, and why facts must
      be treated as untrusted input at scale.
  - name: Ordering, relationships, and dependency edges
    imageFilename: concept-5.png
    details: >-
      Cover the five relationship metaparameters: before, after, require,
      notify, subscribe. Explain containment — how classes and defined
      types create implicit ordering over their contents — and the
      contain() function. Cover chaining arrows, virtual resource
      realisation, the difference between ordering and refresh
      dependencies, and how the agent detects dependency cycles. Explain
      why circular dependencies and missing dependencies are the two most
      common catalog application failures.
  - name: Hiera and data lookup
    imageFilename: concept-6.png
    details: >-
      Explain Hiera as Puppet's hierarchical data separation layer: why
      data should live outside manifests, hiera.yaml hierarchy definition,
      lookup() and automatic class parameter lookup, merge behaviour
      (first, unique, hash, deep), the three-layer hierarchy (global,
      environment, module), interpolation functions, eyaml for secrets,
      and how Hiera enables role/profile patterns by separating policy
      code from site data.
  - name: Exported resources and PuppetDB
    imageFilename: concept-7.png
    details: >-
      Explain exported resources as the mechanism for cross-node
      coordination: the @@ sigil, PuppetDB as the exported resource store,
      collection with <| |> and <<| |>, the storeconfigs model, and
      typical patterns (SSH host keys, Nagios checks, load balancer
      members, HAProxy fragments). Cover the performance and staleness
      implications of large collections, deactivated node cleanup, and
      the catalog's dependency on PuppetDB availability for exported
      resource workflows.
  - name: The agent run cycle and idempotence
    imageFilename: concept-8.png
    details: >-
      Explain the full agent run: fact collection, catalog request and
      compilation on the Puppetserver, catalog download, resource
      evaluation in dependency order, provider-level enforcement (ensure,
      sync, noop), change and event reporting, and run intervals. Define
      idempotence: running the same catalog repeatedly produces the same
      end state. Cover drift — system state diverging from catalog intent —
      how Puppet detects and corrects it, and the practical limits:
      resources Puppet cannot model, exec resources that defeat idempotence,
      and the role of noop mode in safe change validation.
