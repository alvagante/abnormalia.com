id: 10051a2c-c09c-430d-9c38-e0a65a3e354d
name: generate-ixens
description: Generate one self-contained Ixen minisite per topic under ixen/<slug>/ with hero art, supporting concept images, and a reusable soundtrack.
tags: {}
inputs:
  type: object
  properties:
    ixenApiFormat:
      type: string
      enum:
        - anthropic
        - openai-compat
      default: anthropic
    ixenBaseUrl:
      type: string
      description: Optional base URL override for openai-compatible Ixen generation.
    skillLevel:
      type: string
      enum:
        - novice
        - intermediate
        - senior
        - guru
      default: senior
    outputLength:
      type: string
      enum:
        - short
        - medium
        - long
      default: medium
    ixenModel:
      type: string
      default: claude-opus-4-8
    ixenPersona:
      type: string
      enum:
        - neutral
        - alvabot
        - abnormalia
      default: abnormalia
    headerContent:
      type: string
      default: |-
        <nav aria-label="Site" style="display:flex;align-items:center;justify-content:space-between;gap:1rem;font-family:'Courier New',Courier,monospace;font-size:.85rem;">
          <a href="/" aria-label="abnormalia" style="display:inline-flex;align-items:center;text-decoration:none;">
            <img src="/assets/img/logo.png" alt="abnormalia" style="height:2.5rem;width:auto;display:block;">
          </a>
          <a href="/ixen/" style="font-weight:bold;text-decoration:none;">Ixens</a>
        </nav>
    footerContent:
      type: string
      default: |-
        <p style="margin:0;font-family:'Courier New',Courier,monospace;font-size:.8rem;">abnormalia.com &mdash; Lab42 Srl &mdash; <a href="/privacy/">Privacy</a> &middot; <a href="/cookies/">Cookies</a></p>
    cheatsheetVerbosity:
      type: string
      enum:
        - minimal
        - standard
        - detailed
      default: standard
    cheatsheetCompleteness:
      type: string
      enum:
        - essential
        - comprehensive
        - exhaustive
      default: comprehensive
    cheatsheetModel:
      type: string
      default: claude-opus-4-8
    credits:
      type: string
      default: txt by al
    versionOutput:
      type: boolean
      default: true
    imageStyle:
      type: string
      enum:
        - none
        - ixen-dark
        - ixen-light
        - technical-diagram
        - cyberpunk-photo
        - educational
        - pencil-bw
        - pencil-color-accents
        - blueprint
      default: ixen-light
    imageBackground:
      type: string
      enum:
        - opaque
        - transparent
        - auto
      default: opaque
    imageModel:
      type: string
      default: gpt-image-1.5
    imageSize:
      type: string
      default: 1024x1024
    imageQuality:
      type: string
      enum:
        - auto
        - low
        - medium
        - high
      default: auto
    musicGenre:
      type: string
      default: ambient
    musicMood:
      type: string
      default: contemplative
    musicModel:
      type: string
      enum:
        - suno-ttapi
        - lyria-002
      default: suno-ttapi
    musicInstrumental:
      type: boolean
      default: false
    musicSkipThreshold:
      type: integer
      default: 5
      description: Skip music generation for an ixen when this many MP3 files already exist across all versions.
    sunoVersion:
      type: string
      enum:
        - chirp-v3-0
        - chirp-v3-5
        - chirp-v4
        - chirp-v4-5
      default: chirp-v4-5
    infographicStyle:
      type: string
      enum:
        - clean
        - technical
        - ixen
        - editorial
        - blueprint
      default: ixen
    infographicModel:
      type: string
      default: gpt-image-2
    includeBeginnerGuide:
      type: boolean
      default: false
    ixens:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          slug:
            type: string
          title:
            type: string
          description:
            type: string
          topic:
            type: string
          narrator:
            type: string
          details:
            type: string
          heroPrompt:
            type: string
          concepts:
            type: array
            minItems: 2
            maxItems: 8
            items:
              type: object
              properties:
                name:
                  type: string
                details:
                  type: string
                imagePrompt:
                  type: string
                imageFilename:
                  type: string
              required:
                - name
                - imagePrompt
                - imageFilename
        required:
          - slug
          - title
          - description
          - topic
          - narrator
          - details
          - heroPrompt
          - concepts
  required:
    - ixens
jobs:
  - name: prepare
    description: Rotate the current Ixen output before writing fresh media and HTML.
    steps:
      - name: prepare-${{ self.ixen.slug }}
        description: Move the existing generated Ixen page and referenced media into the next numeric version directory.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-ixen"
          modelName: '${{ "ixen-" + self.ixen.slug }}'
          methodName: prepare
          inputs:
            apiFormat: ${{ inputs.ixenApiFormat }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
            enabled: ${{ inputs.versionOutput }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn: []
    weight: 0
  - name: count-tracks
    description: Count existing MP3 files per ixen to decide whether to skip music generation.
    steps:
      - name: count-${{ self.ixen.slug }}
        description: Count MP3 files in versioned subdirectories for one ixen.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/ixen-tracks"
          modelName: '${{ "tracks-" + self.ixen.slug }}'
          methodName: countVersionedTracks
          inputs:
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    weight: 0
  - name: images
    description: Generate the hero and supporting concept images for each Ixen.
    steps:
      - name: hero-${{ self.ixen.slug }}
        description: Generate the hero image for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-hero" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.heroPrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: hero.png
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-1-${{ self.ixen.slug }}
        description: Generate the first supporting concept image for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-1" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[0].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[0].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-2-${{ self.ixen.slug }}
        description: Generate the second supporting concept image for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-2" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[1].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[1].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-3-${{ self.ixen.slug }}
        description: Generate the third supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 2) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-3" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[2].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[2].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-4-${{ self.ixen.slug }}
        description: Generate the fourth supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 3) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-4" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[3].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[3].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-5-${{ self.ixen.slug }}
        description: Generate the fifth supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 4) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-5" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[4].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[4].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-6-${{ self.ixen.slug }}
        description: Generate the sixth supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 5) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-6" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[5].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[5].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-7-${{ self.ixen.slug }}
        description: Generate the seventh supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 6) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-7" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[6].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[6].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
      - name: concept-8-${{ self.ixen.slug }}
        description: Generate the eighth supporting concept image for one Ixen topic when present.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, size(ixen.concepts) > 7) }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug + "-concept-8" }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.concepts[7].imagePrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: ${{ self.ixen.concepts[7].imageFilename }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    weight: 0
  - name: music
    description: Generate a fresh soundtrack for each Ixen that does not yet have enough tracks.
    steps:
      - name: track-${{ self.ixen.slug }}
        description: Generate the soundtrack playlist for one Ixen topic, unless it already has enough MP3s.
        forEach:
          item: ixen
          in: ${{ inputs.ixens.filter(ixen, data.latest("tracks-" + ixen.slug, "versionedTrackCount").attributes.trackCount < inputs.musicSkipThreshold) }}
        task:
          type: model_method
          modelType: "@alvagante/content-music"
          modelName: '${{ "music-" + self.ixen.slug }}'
          methodName: generatePlaylist
          inputs:
            apiKey: ${{ vault.get(onemin-keys, API_KEY) }}
            anthropicApiKey: ${{ vault.get(anthropic-keys, api-key) }}
            topic: ${{ self.ixen.topic }}
            title: ${{ self.ixen.title }}
            genre: ${{ inputs.musicGenre }}
            mood: ${{ inputs.musicMood }}
            instrumental: ${{ inputs.musicInstrumental }}
            model: ${{ inputs.musicModel }}
            sunoVersion: ${{ inputs.sunoVersion }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
      - job: count-tracks
        condition:
          type: succeeded
    weight: 0
  - name: build-manifest
    description: Collect all MP3 tracks across versioned subdirs and the current run into a single ordered list per ixen.
    steps:
      - name: manifest-${{ self.ixen.slug }}
        description: Build the complete track manifest for one ixen, merging historical and new tracks.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/ixen-tracks"
          modelName: '${{ "tracks-" + self.ixen.slug }}'
          methodName: build
          inputs:
            outputDir: ${{ "ixen/" + self.ixen.slug }}
            newTracks: ${{ data.latest("music-" + self.ixen.slug, "playlist").attributes.tracks }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: music
        condition:
          type: succeeded
    weight: 0
  - name: cheatsheets
    description: Generate the inline technical cheatsheet for each Ixen.
    steps:
      - name: cheatsheet-${{ self.ixen.slug }}
        description: Generate the cheatsheet HTML embedded by the Ixen page.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-cheatsheet"
          modelName: '${{ "cheatsheet-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiFormat: ${{ inputs.ixenApiFormat }}
            apiKey: ${{ vault.get(anthropic-keys, api-key) }}
            baseUrl: ${{ inputs.ixenBaseUrl }}
            topic: ${{ self.ixen.topic }}
            details: ${{ self.ixen.details }}
            skillLevel: ${{ inputs.skillLevel }}
            verbosity: ${{ inputs.cheatsheetVerbosity }}
            completeness: ${{ inputs.cheatsheetCompleteness }}
            outputFormat: html
            model: ${{ inputs.cheatsheetModel }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
            filename: cheatsheet.html
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    weight: 0
  - name: infographic
    description: Generate an infographic for each Ixen using its concepts as key points.
    steps:
      - name: infographic-${{ self.ixen.slug }}
        description: Generate the infographic for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-infographic"
          modelName: '${{ "infographic-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            topic: ${{ self.ixen.topic }}
            title: ${{ self.ixen.title }}
            details: ${{ self.ixen.details }}
            keyPoints: ${{ self.ixen.concepts.map(c, c.name) }}
            style: ${{ inputs.infographicStyle }}
            orientation: wide
            model: ${{ inputs.infographicModel }}
            background: opaque
            quality: auto
            format: png
            htmlFilename: infographic.html
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: prepare
        condition:
          type: succeeded
    weight: 0
  - name: page
    description: Generate the narrated Ixen page once hero art, music, cheatsheet and infographic are ready.
    steps:
      - name: ixen-${{ self.ixen.slug }}
        description: Generate the minisite for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-ixen"
          modelName: '${{ "ixen-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiFormat: ${{ inputs.ixenApiFormat }}
            apiKey: ${{ vault.get(anthropic-keys, api-key) }}
            baseUrl: ${{ inputs.ixenBaseUrl }}
            topic: ${{ self.ixen.topic }}
            narrator: ${{ self.ixen.narrator }}
            details: ${{ self.ixen.details }}
            media: hero.png
            concepts: ${{ self.ixen.concepts }}
            skillLevel: ${{ inputs.skillLevel }}
            outputLength: ${{ inputs.outputLength }}
            model: ${{ inputs.ixenModel }}
            persona: ${{ inputs.ixenPersona }}
            credits: ${{ inputs.credits }}
            headerContent: ${{ inputs.headerContent }}
            footerContent: ${{ inputs.footerContent }}
            cheatsheetPath: cheatsheet.html
            infographicPath: infographic.html
            includeBeginnerGuide: ${{ inputs.includeBeginnerGuide }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
            versionOutput: false
            musicTracks: ${{ data.latest("tracks-" + self.ixen.slug, "allTracks").attributes.tracks }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: images
        condition:
          type: succeeded
      - job: build-manifest
        condition:
          type: succeeded
      - job: cheatsheets
        condition:
          type: succeeded
      - job: infographic
        condition:
          type: succeeded
    weight: 0
version: 1
