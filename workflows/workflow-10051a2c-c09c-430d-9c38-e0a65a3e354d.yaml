id: 10051a2c-c09c-430d-9c38-e0a65a3e354d
name: generate-ixens
description: Generate one self-contained Ixen minisite per topic under ixen/<slug>/ with hero graphics and a music track.
tags: {}
inputs:
  type: object
  properties:
    ixenApiFormat:
      type: string
      enum:
        - anthropic
        - openai-compat
      default: anthropic
    ixenBaseUrl:
      type: string
      description: Optional base URL override for openai-compatible Ixen generation.
    skillLevel:
      type: string
      enum:
        - novice
        - intermediate
        - senior
        - guru
      default: senior
    outputLength:
      type: string
      enum:
        - short
        - medium
        - long
      default: medium
    ixenModel:
      type: string
      default: claude-opus-4-8
    credits:
      type: string
      default: txt by al
    imageStyle:
      type: string
      enum:
        - none
        - ixen-dark
        - ixen-light
        - technical-diagram
        - cyberpunk-photo
        - educational
        - pencil-bw
        - pencil-color-accents
        - blueprint
      default: ixen-light
    imageBackground:
      type: string
      enum:
        - opaque
        - transparent
        - auto
      default: opaque
    imageModel:
      type: string
      default: gpt-image-1.5
    imageSize:
      type: string
      default: 1024x1024
    imageQuality:
      type: string
      enum:
        - auto
        - low
        - medium
        - high
      default: auto
    musicGenre:
      type: string
      default: ambient
    musicMood:
      type: string
      default: contemplative
    musicModel:
      type: string
      enum:
        - suno-ttapi
        - lyria-002
      default: suno-ttapi
    musicInstrumental:
      type: boolean
      default: false
    musicLyricsOnly:
      type: boolean
      default: false
    sunoVersion:
      type: string
      enum:
        - chirp-v3-0
        - chirp-v3-5
        - chirp-v4
        - chirp-v4-5
      default: chirp-v4-5
    ixens:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          slug:
            type: string
          title:
            type: string
          description:
            type: string
          topic:
            type: string
          narrator:
            type: string
          details:
            type: string
          heroPrompt:
            type: string
        required:
          - slug
          - title
          - description
          - topic
          - narrator
          - details
          - heroPrompt
  required:
    - ixens
jobs:
  - name: images
    description: Generate one hero image per Ixen.
    steps:
      - name: hero-${{ self.ixen.slug }}
        description: Generate the hero image for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-image"
          modelName: '${{ "image-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(openai-keys, api-key) }}
            prompt: ${{ self.ixen.heroPrompt }}
            style: ${{ inputs.imageStyle }}
            model: ${{ inputs.imageModel }}
            background: ${{ inputs.imageBackground }}
            size: ${{ inputs.imageSize }}
            quality: ${{ inputs.imageQuality }}
            format: png
            filename: hero.png
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn: []
    weight: 0
  - name: music
    description: Generate one music track per Ixen.
    steps:
      - name: track-${{ self.ixen.slug }}
        description: Generate the background track for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-music"
          modelName: '${{ "music-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiKey: ${{ vault.get(onemin-keys, API_KEY) }}
            anthropicApiKey: ${{ vault.get(anthropic-keys, api-key) }}
            topic: ${{ self.ixen.topic }}
            title: ${{ self.ixen.title }}
            genre: ${{ inputs.musicGenre }}
            mood: ${{ inputs.musicMood }}
            instrumental: ${{ inputs.musicInstrumental }}
            model: ${{ inputs.musicModel }}
            sunoVersion: ${{ inputs.sunoVersion }}
            lyricsOnly: ${{ inputs.musicLyricsOnly }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn: []
    weight: 0
  - name: page
    description: Generate the narrated Ixen page once hero art and music are ready.
    steps:
      - name: ixen-${{ self.ixen.slug }}
        description: Generate the minisite for one Ixen topic.
        forEach:
          item: ixen
          in: ${{ inputs.ixens }}
        task:
          type: model_method
          modelType: "@alvagante/content-ixen"
          modelName: '${{ "ixen-" + self.ixen.slug }}'
          methodName: generate
          inputs:
            apiFormat: ${{ inputs.ixenApiFormat }}
            apiKey: ${{ vault.get(anthropic-keys, api-key) }}
            baseUrl: ${{ inputs.ixenBaseUrl }}
            topic: ${{ self.ixen.topic }}
            narrator: ${{ self.ixen.narrator }}
            details: ${{ self.ixen.details }}
            mediaItems:
              - path: hero.png
                prompt: ${{ self.ixen.heroPrompt }}
            skillLevel: ${{ inputs.skillLevel }}
            outputLength: ${{ inputs.outputLength }}
            model: ${{ inputs.ixenModel }}
            credits: ${{ inputs.credits }}
            outputDir: ${{ "ixen/" + self.ixen.slug }}
            musicFilename: ${{ data.latest("music-" + self.ixen.slug, "song").attributes.filename }}
            musicTitle: ${{ data.latest("music-" + self.ixen.slug, "song").attributes.title }}
            musicLyrics: ${{ data.latest("music-" + self.ixen.slug, "song").attributes.lyrics }}
        dependsOn: []
        weight: 0
        allowFailure: false
    dependsOn:
      - job: images
        condition:
          type: succeeded
      - job: music
        condition:
          type: succeeded
    weight: 0
version: 1
