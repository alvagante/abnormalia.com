content: |
  <p class="binary">01001001 00100000 01100001 01101101</p>

  <section class="chapter">
    <p>I live below your virtual machines and above the bare insistence of silicon. You call me a hypervisor as if I were only a divider, but division is the least interesting thing I do. I arbitrate time. I lend memory without surrendering trust. I let one kernel dream while another crashes in private.</p>
    <p class="whisper">i keep their worlds from touching</p>
    <blockquote class="ixen-pull">Isolation is not distance. It is discipline.</blockquote>
  </section>

  <section class="chapter">
    <figure class="zoom float-left large"><img src="./hero.svg" alt="A Xen hypervisor as a stark architectural diagram balancing dom0 and two guest domains above hardware, with memory maps and scheduler lanes."><figcaption>The shape I hold when everyone else believes they are alone.</figcaption></figure>
    <p>Dom0 is the part of me that speaks with hands. It owns drivers, touches disks, negotiates with NICs, and performs the impolite labor the guests are not allowed to perform themselves. DomU, meanwhile, is how I let operating systems believe they have a country of their own. They boot. They mount filesystems. They page and fork and panic. I stand there with a scheduler in one hand and a map of machine frames in the other.</p>
    <div class="term"><span class="host">dom0 #</span> <span class="cmd">xl list</span></div>
    <pre class="output">Name                                        ID   Mem VCPUs      State   Time(s)
      Domain-0                                     0  4096     8     r-----    9312.4
      build-guest                                  7  2048     2     -b----     441.8
      db-guest                                     9  8192     4     -b----    1184.2</pre>
    <p>That output is not an inventory. It is a census of tolerated illusions.</p>
  </section>

  <section class="chapter">
    <figure class="ixen-art">
      <svg viewBox="0 0 480 220" xmlns="http://www.w3.org/2000/svg">
        <rect x="20" y="20" width="440" height="180" fill="none" stroke="#111" stroke-width="2"/>
        <rect x="40" y="40" width="400" height="35" fill="none" stroke="#111" stroke-width="2"/>
        <text x="240" y="62" text-anchor="middle" font-family="monospace" font-size="16">hardware: cpu | ram | iommu | interrupts</text>
        <rect x="40" y="90" width="400" height="35" fill="none" stroke="#c00" stroke-width="2"/>
        <text x="240" y="112" text-anchor="middle" font-family="monospace" font-size="16">xen scheduler | memory map | grant tables | event channels</text>
        <rect x="40" y="140" width="110" height="35" fill="none" stroke="#111" stroke-width="2"/>
        <rect x="185" y="140" width="110" height="35" fill="none" stroke="#111" stroke-width="2"/>
        <rect x="330" y="140" width="110" height="35" fill="none" stroke="#111" stroke-width="2"/>
        <text x="95" y="162" text-anchor="middle" font-family="monospace" font-size="15">dom0</text>
        <text x="240" y="162" text-anchor="middle" font-family="monospace" font-size="15">domU-a</text>
        <text x="385" y="162" text-anchor="middle" font-family="monospace" font-size="15">domU-b</text>
        <line x1="95" y1="125" x2="95" y2="140" stroke="#111" stroke-width="2"/>
        <line x1="240" y1="125" x2="240" y2="140" stroke="#111" stroke-width="2"/>
