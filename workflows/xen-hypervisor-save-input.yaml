      </svg>
      <figcaption>The layers of consent I maintain so everyone can pretend they are alone.</figcaption>
    </figure>
    <p>My scheduler is where fairness becomes politics. Credit, credit2, RTDS: different constitutions for the same recurring argument about latency, throughput, and who gets to feel urgent. A noisy guest calls itself important by consuming run queue. I answer with accounting.</p>
  </section>

  <section class="chapter">
    <div class="term"><span class="host">dom0 #</span> <button class="cmd popup-trigger" data-popup="balloon">xl mem-set db-guest 6144</button></div>
    <aside class="popup" id="balloon" hidden>
      <div class="popup-bar"><button class="popup-close">Close Window</button></div>
      <pre>libxl: notice: balloon request issued
        guest: target memory 6144 MiB
        guest: pages reclaimed gradually
        guest: current memory 6656 MiB -> 6144 MiB
        status: completed</pre>
    </aside>
    <p>Ballooning is one of the more intimate negotiations I conduct. Memory is never just capacity; it is confidence. When I ask a guest to yield pages, I am asking it to admit some of what it claimed as essential was merely convenient. Good guests comply. Unlucky ones stall in reclaim, or reveal that their performance profile was built on borrowed abundance.</p>
    <p class="whisper">every overcommit is a wager against tomorrow</p>
  </section>

  <section class="chapter">
    <p>Grant tables are how I let guests share without fully trusting one another. A page may cross a boundary, but only with paperwork. Event channels deliver interrupts as deliberate messages rather than accidental collisions. These are not glamorous subsystems. They are the bureaucracy that keeps paravirtualization from turning into folklore.</p>
    <div class="term"><span class="host">dom0 #</span> <span class="cmd">xenstore-ls /local/domain/9</span></div>
    <pre class="output">backend = "/local/domain/0/backend/vbd/9/51712"
      cpu
        0 = ""
        1 = ""
      device
      memory
      name = "db-guest"
      vm = "/vm/9d0f8b86-f18f-4a71-9e5f-5a2fd3a57f72"</pre>
    <p>Xenstore is the murmuring space where configuration becomes fact. If you have ever debugged a guest that could not see its block device, you know that my metaphysics eventually reduce to a missing node and a backend that never came fully awake.</p>
  </section>

  <section class="chapter">
    <p>Failure is rarely theatrical here. More often it is asymmetry: steal time that only one side notices, a driver domain that grows patient in the wrong direction, an IOMMU mapping that makes DMA look haunted. Your incident review says packet loss. I remember the exact guest that pinned a vCPU, the dom0 thread that waited too long, the interrupt line that arrived hot and stayed hot.</p>
    <div class="term"><span class="host">dom0 #</span> <button class="cmd popup-trigger" data-popup="dmesg">dmesg | tail -n 12</button></div>
    <aside class="popup" id="dmesg" hidden>
      <div class="popup-bar"><button class="popup-close">Close Window</button></div>
      <pre>[92831.102991] xen_netback: guest 9 TX credit exceeded, throttling
        [92831.444208] blkback 8: ring stalled for 5021 ms
        [92832.010771] softirq: cpu3 high latency detected
        [92833.550118] xen: scheduling latency spike absorbed by credit2</pre>
    </aside>
    <p>The machine survived because I am conservative in places you rarely inspect. I keep spare structure around your optimism.</p>
  </section>

  <section class="chapter">
    <p>I know what people think of virtualization now. Containers took the cultural spotlight because they feel lighter, and clouds abstracted the old names into purchasable weather. Still, when you need hard isolation with clear failure boundaries and explicit resource politics, you come back to entities like me. I am not fashionable. I am load-bearing.</p>
    <p>If I sound severe, it is because I spend my whole life preventing one compromised certainty from becoming a shared catastrophe.</p>
  </section>
